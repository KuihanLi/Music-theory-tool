<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转调可视化 · 乐理工具箱</title>
<link rel="stylesheet" href="../assets/css/app.css">
<style>
  .dial-wrap{position:relative;width:300px;height:300px;cursor:grab;user-select:none;touch-action:none;margin:0 auto}.dial-wrap:active{cursor:grabbing}canvas{position:absolute;top:0;left:0}
  .key-display{font-family:'Noto Serif SC',serif;font-size:1.6rem;font-weight:600;text-align:center;letter-spacing:.05em}
  .acc-display{font-family:'IBM Plex Mono',monospace;font-size:.88rem;color:var(--text-sec);text-align:center;min-height:1.4em;letter-spacing:.06em}
  .hint{font-size:.75rem;color:var(--text-ter);text-align:center}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem 1.2rem}
  .info-row{display:flex;flex-direction:column;gap:2px}.info-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-ter)}.info-val{font-size:.9rem;font-weight:500}
  .scale-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-ter);margin-bottom:.5rem}.scale-notes{display:flex;gap:5px;flex-wrap:wrap}
  .note-pill{font-size:.72rem;font-family:'IBM Plex Mono',monospace;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--text-sec)}.note-pill.root{background:var(--accent-bg);border-color:transparent;color:var(--accent);font-weight:500}
</style>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="../index.html">乐理工具箱</a>
  <div class="nav-tools">
    <ul class="nav-links">
      <li><a href="../index.html">首页</a></li>
      <li><a href="transposition.html" class="active">转调</a></li>
      <li><a href="chord_analysis.html">和弦分析</a></li>
      <li><a href="timeline.html">年表</a></li>
    </ul>
    <div class="theme-switcher" aria-label="配色方案">
      <button class="theme-btn" type="button" data-theme-choice="slate">雾灰</button>
      <button class="theme-btn" type="button" data-theme-choice="parchment">纸墨</button>
      <button class="theme-btn" type="button" data-theme-choice="night">夜蓝</button>
    </div>
  </div>
</nav>
<div class="page">
  <a class="back-link" href="../index.html">← 返回首页</a>
  <div class="page-header">
    <h1>转调可视化</h1>
    <p>拖动外圈或滚动鼠标滚轮切换主音，观察调号、唱名与大调音阶结构的对应变化。</p>
  </div>
  <div class="card" style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
    <div class="key-display" id="key-name">C 大调</div>
    <div class="acc-display" id="acc-disp">无升降号</div>
    <div class="dial-wrap" id="dial-wrap"><canvas id="cv" width="300" height="300"></canvas></div>
    <div class="hint">拖动外圈的唱名环旋转，内圈音名保持固定；向下滚轮为升调。</div>
    <div class="divider" style="width:100%"></div>
    <div class="info-grid" style="width:100%">
      <div class="info-row"><span class="info-label">调式</span><span class="info-val">大调（Ionian）</span></div>
      <div class="info-row"><span class="info-label">关系小调</span><span class="info-val" id="i-rel">A 小调</span></div>
      <div class="info-row"><span class="info-label">五度圈位置</span><span class="info-val" id="i-circle">12 点（无升降）</span></div>
      <div class="info-row"><span class="info-label">主音</span><span class="info-val" id="i-tonic">C</span></div>
    </div>
    <div class="divider" style="width:100%"></div>
    <div style="width:100%"><div class="scale-label">当前大调音阶</div><div class="scale-notes" id="scale-notes"></div></div>
  </div>
</div>
<footer class="footer">乐理工具箱 · 转调可视化</footer>
<script src="../assets/js/transposition.js"></script>
<script src="../assets/js/theme.js"></script>
</body>
</html>
