<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>转调可视化 — 乐理工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --text-pri: #1a1917;
    --text-sec: #73706a;
    --text-ter: #a09d96;
    --border: rgba(0,0,0,0.09);
    --border-mid: rgba(0,0,0,0.16);
    --accent: #2563eb;
    --accent-light: rgba(37,99,235,0.12);
    --solfege: #92400e;
    --solfege-light: rgba(146,64,14,0.10);
    --pointer: #065f46;
    --radius: 16px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1c1a;
      --surface2: #252523;
      --text-pri: #e8e5dc;
      --text-sec: #9c9890;
      --text-ter: #6a6760;
      --border: rgba(255,255,255,0.09);
      --border-mid: rgba(255,255,255,0.18);
      --accent: #60a5fa;
      --accent-light: rgba(96,165,250,0.18);
      --solfege: #fbbf24;
      --solfege-light: rgba(251,191,36,0.15);
      --pointer: #34d399;
    }
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-pri);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 3rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  header h1 {
    font-family: 'Noto Serif SC', serif;
    font-weight: 600;
    font-size: 1.6rem;
    letter-spacing: .06em;
    color: var(--text-pri);
  }
  header p {
    font-size: .8rem;
    color: var(--text-ter);
    margin-top: .3rem;
    letter-spacing: .04em;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem 1.5rem;
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }

  .key-display {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: var(--text-pri);
    letter-spacing: .05em;
  }

  .acc-display {
    font-family: 'DM Mono', monospace;
    font-size: .9rem;
    color: var(--text-sec);
    min-height: 1.3em;
    letter-spacing: .05em;
  }

  .dial-wrap {
    position: relative;
    width: 300px;
    height: 300px;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }
  .dial-wrap:active { cursor: grabbing; }
  canvas { position: absolute; top: 0; left: 0; }

  .hint {
    font-size: .75rem;
    color: var(--text-ter);
    letter-spacing: .03em;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  .info-grid {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .6rem 1.2rem;
  }
  .info-row { display: flex; flex-direction: column; gap: 2px; }
  .info-label { font-size: .7rem; color: var(--text-ter); letter-spacing: .04em; text-transform: uppercase; }
  .info-val { font-size: .95rem; color: var(--text-pri); font-weight: 500; }

  .scale-section { width: 100%; }
  .scale-label { font-size: .7rem; color: var(--text-ter); letter-spacing: .04em; text-transform: uppercase; margin-bottom: .5rem; }
  .scale-notes { display: flex; gap: 6px; flex-wrap: wrap; }
  .note-pill {
    font-size: .75rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-sec);
    transition: background .2s;
  }
  .note-pill.root {
    background: var(--accent-light);
    border-color: rgba(37,99,235,0.25);
    color: var(--accent);
    font-weight: 500;
  }
  @media (prefers-color-scheme: dark) {
    .note-pill.root { border-color: rgba(96,165,250,0.25); }
  }

  footer {
    margin-top: 2rem;
    font-size: .72rem;
    color: var(--text-ter);
    text-align: center;
    letter-spacing: .04em;
  }
</style>
</head>
<body>

<header>
  <h1>转调可视化</h1>
  <p>拖动外圈旋转 · 滚动鼠标切换调性</p>
</header>

<div class="card">
  <div class="key-display" id="key-name">C 大调</div>
  <div class="acc-display" id="acc-disp">无升降号</div>

  <div class="dial-wrap" id="dial-wrap">
    <canvas id="cv" width="300" height="300"></canvas>
  </div>

  <div class="hint">拖动外圈（唱名环）旋转，内圈音名固定</div>

  <div class="divider"></div>

  <div class="info-grid">
    <div class="info-row">
      <span class="info-label">调式</span>
      <span class="info-val" id="i-mode">大调（Ionian）</span>
    </div>
    <div class="info-row">
      <span class="info-label">关系小调</span>
      <span class="info-val" id="i-rel">A 小调</span>
    </div>
    <div class="info-row">
      <span class="info-label">五度圈位置</span>
      <span class="info-val" id="i-circle">12点（无升降）</span>
    </div>
    <div class="info-row">
      <span class="info-label">主音</span>
      <span class="info-val" id="i-tonic">C</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="scale-section">
    <div class="scale-label">该调音阶</div>
    <div class="scale-notes" id="scale-notes"></div>
  </div>
</div>

<footer>乐理工具 · 转调可视化</footer>

<script>
const NOTE_NAMES = ['C','C#/D♭','D','D#/E♭','E','F','F#/G♭','G','G#/A♭','A','A#/B♭','B'];
const SOLFEGE = ['1','2','3','4','5','6','7'];
const MAJOR_STEPS = [0,2,4,5,7,9,11];

const KEYS = [
  {name:'C',  acc:0, sym:'',  rel:'A'},
  {name:'G',  acc:1, sym:'#', rel:'E'},
  {name:'D',  acc:2, sym:'#', rel:'B'},
  {name:'A',  acc:3, sym:'#', rel:'F#'},
  {name:'E',  acc:4, sym:'#', rel:'C#'},
  {name:'B',  acc:5, sym:'#', rel:'G#'},
  {name:'F#', acc:6, sym:'#', rel:'D#'},
  {name:'C#', acc:7, sym:'#', rel:'A#'},
  {name:'A♭', acc:4, sym:'♭', rel:'F'},
  {name:'E♭', acc:3, sym:'♭', rel:'C'},
  {name:'B♭', acc:2, sym:'♭', rel:'G'},
  {name:'F',  acc:1, sym:'♭', rel:'D'},
];

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const CX = 150, CY = 150;
const R_OUT = 138, R_IN = 100, R_MID = 72, R_CENTER = 44;

let outerAngle = 0;
let dragging = false, lastAngle = 0;

function getRootSemitone() {
  let steps = Math.round(-outerAngle / (Math.PI/6));
  return ((steps % 12) + 12) % 12;
}

function getKeyByRoot(semi) {
  const prefer = {0:'C',2:'D',4:'E',5:'F',7:'G',9:'A',11:'B',6:'F#',1:'C#',8:'A♭',3:'E♭',10:'B♭'};
  let pName = prefer[semi] || NOTE_NAMES[semi];
  return KEYS.find(k => k.name === pName) || KEYS[0];
}

function getAccDisplay(key) {
  if (key.acc === 0) return '无升降号';
  let sym = key.sym === '#' ? '♯' : '♭';
  const sharpOrder = ['F','C','G','D','A','E','B'];
  const flatOrder  = ['B','E','A','D','G','C','F'];
  let order = key.sym === '#' ? sharpOrder : flatOrder;
  return order.slice(0, key.acc).map(n => n + sym).join('  ');
}

function getScale(semi) {
  return MAJOR_STEPS.map(s => NOTE_NAMES[(semi + s) % 12]);
}

function getCirclePos(n) {
  const positions = ['12点（无升降）','7点（1#）','2点（2#）','9点（3#）','4点（4#）','11点（5#）','6点（6#/6♭）','1点（7#）','8点（4♭）','3点（3♭）','10点（2♭）','5点（1♭）'];
  const semi2pos = {0:0,7:1,2:2,9:3,4:4,11:5,6:6,1:7,8:8,3:9,10:10,5:11};
  return positions[semi2pos[n] ?? 0];
}

function isDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}

function getTheme() {
  const dark = isDark();
  return {
    ring1:    dark ? '#222220' : '#f0ede6',
    ring2:    dark ? '#1c1c1a' : '#ffffff',
    stroke:   dark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.09)',
    textPri:  dark ? '#e8e5dc' : '#1a1917',
    textSec:  dark ? '#9c9890' : '#73706a',
    accent:   dark ? '#60a5fa' : '#2563eb',
    accentBg: dark ? 'rgba(96,165,250,0.18)' : 'rgba(37,99,235,0.12)',
    solfege:  dark ? '#fbbf24' : '#92400e',
    solfegeBg:dark ? 'rgba(251,191,36,0.15)' : 'rgba(146,64,14,0.10)',
    pointer:  dark ? '#34d399' : '#065f46',
  };
}

function draw() {
  ctx.clearRect(0, 0, 300, 300);
  const t = getTheme();
  const root = getRootSemitone();

  // Outer ring fill
  ctx.beginPath(); ctx.arc(CX, CY, R_OUT, 0, Math.PI*2);
  ctx.fillStyle = t.ring1; ctx.fill();

  // Inner ring fill
  ctx.beginPath(); ctx.arc(CX, CY, R_IN, 0, Math.PI*2);
  ctx.fillStyle = t.ring2; ctx.fill();

  // Center fill
  ctx.beginPath(); ctx.arc(CX, CY, R_CENTER, 0, Math.PI*2);
  ctx.fillStyle = t.ring1; ctx.fill();

  // Ring borders
  [R_OUT, R_IN, R_MID, R_CENTER].forEach(r => {
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, Math.PI*2);
    ctx.strokeStyle = t.stroke; ctx.lineWidth = 0.8; ctx.stroke();
  });

  // Tick lines
  for (let i = 0; i < 12; i++) {
    const a = i * Math.PI/6 - Math.PI/2;
    [[R_IN+2, R_OUT-2],[R_MID+2, R_IN-2]].forEach(([r1,r2]) => {
      ctx.beginPath();
      ctx.moveTo(CX + r1*Math.cos(a), CY + r1*Math.sin(a));
      ctx.lineTo(CX + r2*Math.cos(a), CY + r2*Math.sin(a));
      ctx.strokeStyle = t.stroke; ctx.lineWidth = 0.8; ctx.stroke();
    });
  }

  // Inner ring: chromatic note names (fixed)
  for (let i = 0; i < 12; i++) {
    const a = i * Math.PI/6 - Math.PI/2;
    const r = (R_MID + R_IN) / 2;
    const x = CX + r*Math.cos(a), y = CY + r*Math.sin(a);
    const note = NOTE_NAMES[i];
    const isRoot = (i === root);

    if (isRoot) {
      ctx.beginPath(); ctx.arc(x, y, 13, 0, Math.PI*2);
      ctx.fillStyle = t.accentBg; ctx.fill();
    }

    const parts = note.split('/');
    ctx.fillStyle = isRoot ? t.accent : t.textPri;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (parts.length > 1) {
      ctx.font = `400 9.5px 'DM Mono', monospace`;
      ctx.fillText(parts[0], x, y - 5);
      ctx.fillStyle = isRoot ? t.accent : t.textSec;
      ctx.font = `400 8.5px 'DM Mono', monospace`;
      ctx.fillText(parts[1], x, y + 5);
    } else {
      ctx.font = `${isRoot ? '600' : '400'} 12px 'DM Sans', sans-serif`;
      ctx.fillText(note, x, y);
    }
  }

  // Outer ring: solfege (rotated)
  for (let si = 0; si < 7; si++) {
    const semOff = MAJOR_STEPS[si];
    const totalAngle = outerAngle + semOff * Math.PI/6 - Math.PI/2;
    const r = (R_IN + R_OUT) / 2;
    const x = CX + r*Math.cos(totalAngle), y = CY + r*Math.sin(totalAngle);
    const isTonic = si === 0;

    if (isTonic) {
      ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI*2);
      ctx.fillStyle = t.solfegeBg; ctx.fill();
    }
    ctx.fillStyle = isTonic ? t.solfege : t.textPri;
    ctx.font = `${isTonic ? '600' : '400'} 13px 'DM Sans', sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(SOLFEGE[si], x, y);
  }

  // Center: key name
  const key = getKeyByRoot(root);
  ctx.fillStyle = t.accent;
  ctx.font = `600 17px 'Noto Serif SC', serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(key.name, CX, CY - 8);
  ctx.fillStyle = t.textSec;
  ctx.font = `400 10px 'DM Sans', sans-serif`;
  ctx.fillText('大调', CX, CY + 9);

  // Pointer triangle (top)
  ctx.beginPath();
  ctx.moveTo(CX, 3); ctx.lineTo(CX-5, 17); ctx.lineTo(CX+5, 17);
  ctx.closePath();
  ctx.fillStyle = t.pointer; ctx.fill();

  updateInfo(root, key);
}

function updateInfo(semi, key) {
  document.getElementById('key-name').textContent = key.name + ' 大调';
  document.getElementById('acc-disp').textContent = getAccDisplay(key);
  document.getElementById('i-rel').textContent = key.rel + ' 小调';
  document.getElementById('i-tonic').textContent = key.name;
  document.getElementById('i-circle').textContent = getCirclePos(semi);

  const scale = getScale(semi);
  const container = document.getElementById('scale-notes');
  container.innerHTML = '';
  scale.forEach((n, i) => {
    const pill = document.createElement('span');
    pill.className = 'note-pill' + (i === 0 ? ' root' : '');
    pill.textContent = SOLFEGE[i] + ' ' + n;
    container.appendChild(pill);
  });
}

// Drag
const wrap = document.getElementById('dial-wrap');

function getClientXY(e) {
  return e.touches ? [e.touches[0].clientX, e.touches[0].clientY] : [e.clientX, e.clientY];
}
function getAngle(e) {
  const rect = wrap.getBoundingClientRect();
  const [cx, cy] = [rect.left + rect.width/2, rect.top + rect.height/2];
  const [px, py] = getClientXY(e);
  return Math.atan2(py - cy, px - cx);
}
function isOuterRing(e) {
  const rect = wrap.getBoundingClientRect();
  const [cx, cy] = [rect.left + rect.width/2, rect.top + rect.height/2];
  const [px, py] = getClientXY(e);
  const d = Math.hypot(px - cx, py - cy);
  return d > R_IN * (rect.width / 300);
}

wrap.addEventListener('mousedown', e => { if (!isOuterRing(e)) return; dragging = true; lastAngle = getAngle(e); e.preventDefault(); });
wrap.addEventListener('touchstart', e => { if (!isOuterRing(e)) return; dragging = true; lastAngle = getAngle(e); e.preventDefault(); }, {passive:false});

window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const a = getAngle(e), da = Math.atan2(Math.sin(a - lastAngle), Math.cos(a - lastAngle));
  outerAngle += da; lastAngle = a; draw();
});
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  const a = getAngle(e), da = Math.atan2(Math.sin(a - lastAngle), Math.cos(a - lastAngle));
  outerAngle += da; lastAngle = a; draw(); e.preventDefault();
}, {passive:false});

function snapToNearest() {
  outerAngle = Math.round(outerAngle / (Math.PI/6)) * (Math.PI/6);
  draw();
}
window.addEventListener('mouseup',  () => { if (dragging) { dragging = false; snapToNearest(); } });
window.addEventListener('touchend', () => { if (dragging) { dragging = false; snapToNearest(); } });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  outerAngle -= Math.sign(e.deltaY) * Math.PI/6;
  snapToNearest();
}, {passive:false});

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', draw);

draw();
</script>
</body>
</html>
