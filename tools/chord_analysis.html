<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>和弦分析 · 乐理工具箱</title>
<link rel="stylesheet" href="../assets/css/app.css">
<style>
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(280px, .9fr);
    gap: 1rem;
    align-items: start;
  }
  .input-card {
    position: sticky;
    top: 72px;
  }
  .label {
    display: block;
    font-size: .74rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-ter);
    margin-bottom: .55rem;
  }
  .search-row {
    display: flex;
    gap: .7rem;
    align-items: stretch;
  }
  .search-input {
    flex: 1;
    width: 100%;
    border: 1px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: .82rem .95rem;
    font: inherit;
    color: var(--text-pri);
    background: var(--surface);
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-bg);
  }
  .preset-list {
    display: flex;
    gap: .55rem;
    flex-wrap: wrap;
    margin-top: 1rem;
  }
  .preset {
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-sec);
    border-radius: 999px;
    padding: .4rem .75rem;
    font: inherit;
    font-size: .8rem;
    cursor: pointer;
  }
  .preset:hover {
    color: var(--text-pri);
    border-color: var(--border-mid);
  }
  .example-text {
    margin-top: .9rem;
    font-size: .8rem;
    color: var(--text-ter);
    line-height: 1.6;
  }
  .hero-result {
    display: flex;
    justify-content: space-between;
    gap: 1rem;
    align-items: start;
  }
  .chord-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 2rem;
    line-height: 1.15;
    letter-spacing: .04em;
  }
  .chord-subtitle {
    margin-top: .45rem;
    color: var(--text-sec);
    font-size: .9rem;
  }
  .chord-pills {
    display: flex;
    gap: .5rem;
    flex-wrap: wrap;
    margin-top: .9rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }
  .section-title {
    font-size: .78rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-ter);
    margin-bottom: .65rem;
  }
  .tone-list,
  .interval-list,
  .alias-list {
    display: flex;
    flex-wrap: wrap;
    gap: .55rem;
  }
  .tone-chip,
  .interval-chip,
  .alias-chip {
    padding: .42rem .72rem;
    border-radius: 999px;
    background: var(--surface2);
    border: 1px solid var(--border);
    font-size: .8rem;
  }
  .tone-chip strong {
    font-family: 'DM Mono', monospace;
    font-size: .82rem;
  }
  .degree-grid {
    display: grid;
    gap: .55rem;
  }
  .degree-row {
    display: grid;
    grid-template-columns: 76px 1fr 108px;
    gap: .8rem;
    align-items: center;
    padding: .7rem .85rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
  }
  .degree-row .mono {
    font-size: .82rem;
  }
  .degree-row .muted {
    font-size: .8rem;
  }
  .empty-state,
  .error-state {
    font-size: .88rem;
    line-height: 1.7;
    color: var(--text-sec);
  }
  .error-state {
    color: #b91c1c;
  }
  .help-list {
    display: grid;
    gap: .65rem;
    font-size: .82rem;
    color: var(--text-sec);
    line-height: 1.6;
  }
  .help-list code {
    font-size: .78rem;
  }
  @media (max-width: 820px) {
    .layout,
    .grid {
      grid-template-columns: 1fr;
    }
    .input-card {
      position: static;
    }
    .hero-result {
      flex-direction: column;
    }
    .degree-row {
      grid-template-columns: 66px 1fr 96px;
    }
  }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="../index.html">乐理工具箱</a>
  <div class="nav-tools">
    <ul class="nav-links">
      <li><a href="../index.html">首页</a></li>
      <li><a href="transposition.html">转调</a></li>
      <li><a href="chord_analysis.html" class="active">和弦分析</a></li>
      <li><a href="timeline.html">年表</a></li>
    </ul>
    <div class="theme-switcher" aria-label="配色方案">
      <button class="theme-btn" type="button" data-theme-choice="slate">雾灰</button>
      <button class="theme-btn" type="button" data-theme-choice="parchment">纸墨</button>
      <button class="theme-btn" type="button" data-theme-choice="night">夜蓝</button>
    </div>
  </div>
</nav>

<div class="page-wide">
  <a class="back-link" href="../index.html">← 返回首页</a>

  <div class="page-header">
    <h1>和弦分析</h1>
    <p>输入常见流行和声标记，查看组成音、度数、音程与和弦类型说明。</p>
  </div>

  <div class="layout">
    <div class="card input-card">
      <label class="label" for="chord-input">输入和弦</label>
      <div class="search-row">
        <input id="chord-input" class="search-input" type="text" value="F#m7b5" spellcheck="false" autocomplete="off" placeholder="例如 Cmaj7、Bbadd9、G/B">
        <button id="analyze-btn" class="btn btn-accent" type="button">分析</button>
      </div>

      <div class="preset-list" id="preset-list"></div>
      <div class="example-text">
        支持：<code>maj7</code>、<code>m7</code>、<code>7</code>、<code>dim</code>、<code>aug</code>、<code>sus2</code>、<code>sus4</code>、<code>add9</code>、<code>6</code>、<code>m6</code>、<code>m7b5</code>、<code>dim7</code>、<code>/低音</code>
      </div>
    </div>

    <div class="card">
      <div class="section-title">输入规则</div>
      <div class="help-list">
        <div>根音支持升降记号，例如 <code>F#</code>、<code>Bb</code>。</div>
        <div>小三和弦可写 <code>m</code>，大七和弦可写 <code>maj7</code>，属七写 <code>7</code>。</div>
        <div>转位和弦使用斜杠，例如 <code>C/E</code>、<code>G7/B</code>。</div>
        <div>结果会优先沿用输入里的升降体系，避免把 <code>Bb</code> 自动写成 <code>A#</code>。</div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-top:1rem;">
    <div id="result-root">
      <div class="empty-state">输入一个和弦标记后即可查看分析结果。</div>
    </div>
  </div>
</div>

<footer class="footer">乐理工具箱 · 和弦分析</footer>

<script src="../assets/js/chord-analysis.js"></script>
<script src="../assets/js/theme.js"></script>
</body>
</html>
